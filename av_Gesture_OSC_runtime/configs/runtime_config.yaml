# av_Gesture_OSC_runtime configuration

mediapipe:
  model_path: "models/hand_landmarker.task"
  num_hands: 2
  min_hand_detection_confidence: 0.5
  min_hand_presence_confidence: 0.5
  min_tracking_confidence: 0.5

runtime_model:
  encoder_path: "models/encoder.pt"
  feature_scaler_path: "models/feature_scaler.joblib"
  cluster_model_path: "models/cluster_model.joblib"
  embedding_scaler_path: "models/embedding_scaler.joblib"
  cluster_names_path: "models/cluster_names.json"
  runtime_model_config_path: "models/runtime_model_config.json"

features:
  # Fallbacks only. Stage 2 models/runtime_model_config.json overrides these.
  window_size: 60
  feature_dim: 126
  include_velocity: false
  normalize_to_wrist: true
  normalize_scale_landmark: 9

osc:
  host: "127.0.0.1"
  port: 9000
  prefix: "/av_gesture"
  send_full_landmarks: true
  send_latent: true
  send_debug: true

smoothing:
  cluster_history: 7
  min_confidence: 0.0
  hold_last_valid: true

preview:
  show_window: true
  draw_landmarks: true #change to false to hide mediapipe landmarks
