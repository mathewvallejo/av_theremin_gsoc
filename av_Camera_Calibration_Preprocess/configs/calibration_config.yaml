checkerboard:
  inner_corners_x: 9
  inner_corners_y: 6
  square_size_m: 0.024

capture:
  image_extension: ".png"
  autosave_interval_seconds: 1.0
  min_pose_change_pixels: 25.0
  mirror_preview: false

calibration:
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp"]
  corner_refinement: true
  show_preview: false

undistortion:
  alpha: 0.0
